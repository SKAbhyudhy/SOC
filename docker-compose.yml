services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
  backend:
    build: ./backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
    depends_on: [redis, ollama]
    ports: ["8000:8000"]
  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_WS_URL=ws://backend:8000/ws/live
    depends_on: [backend]
    ports: ["3000:3000"]
